<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Stranica Nije Pronađena | Koliba Pčelica 1</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Montserrat', sans-serif;
            background: linear-gradient(135deg, #0F1A0A, #1A2614);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #F5F1E8;
            text-align: center;
            padding: 20px;
        }
        
        .error-container {
            max-width: 600px;
        }
        
        .error-icon {
            font-size: 8rem;
            margin-bottom: 20px;
            animation: float 3s ease-in-out infinite;
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }
        
        .error-code {
            font-family: 'Cormorant Garamond', serif;
            font-size: 6rem;
            font-weight: 700;
            color: #D4A853;
            margin-bottom: 10px;
        }
        
        h1 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 2rem;
            margin-bottom: 20px;
        }
        
        p {
            color: #B8C4A8;
            font-size: 1.1rem;
            margin-bottom: 30px;
            line-height: 1.7;
        }
        
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 16px 32px;
            background: linear-gradient(135deg, #D4A853, #B8923A);
            color: #0F1A0A;
            text-decoration: none;
            font-weight: 600;
            border-radius: 30px;
            transition: all 0.3s ease;
        }
        
        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(212, 168, 83, 0.3);
        }
        
        .decorative-bees {
            margin-top: 40px;
            font-size: 2rem;
            opacity: 0.5;
        }
    </style>
</head>
<body>
    <div class="error-container">
        <div class="error-icon">🐝</div>
        <div class="error-code">404</div>
        <h1>Pčele su Zalutale!</h1>
        <p>
            Nažalost, stranica koju tražite ne postoji ili je premeštena. 
            Možda su je naše pčele odnele u košnicu?
        </p>
        <a href="/" class="btn">
            <span>🏡</span>
            <span>Povratak na Početnu</span>
        </a>
        <div class="decorative-bees">
            🌸 🐝 🌻 🐝 🌺
        </div>
    </div>
</body>
</html>
